<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ report_title if report_title else "DataOp report" }}</title>
    <style>
     {% include "data_ops.css" %}
    </style>
</head>

<body>
    {% if report_title %}
        <h1>{{ report_title }}</h1>
    {% endif %}
    <p>
        Click on a node to display more information.
    </p>
    <div id="graph-nav" data-node-status='{{ node_status | tojson }}'>
        {{ svg | safe }}
    </div>
</body>
<script>
 {% include "data_ops-report.js" %}
</script>

</html>
